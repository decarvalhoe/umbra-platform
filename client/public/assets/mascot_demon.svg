<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>
    </radialGradient>
    <filter id="demonGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#9b59b6" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Aura glow behind -->
  <ellipse cx="100" cy="130" rx="60" ry="70" fill="#9b59b6" opacity="0.08" filter="url(#softGlow)"/>

  <!-- Body / robe -->
  <path d="M100 80 C60 80 40 120 45 180 L55 220 L145 220 L155 180 C160 120 140 80 100 80Z" fill="url(#bodyGrad)" stroke="#b39ddb" stroke-width="1" stroke-opacity="0.3" filter="url(#demonGlow)"/>

  <!-- Inner robe detail -->
  <path d="M80 140 L100 220 L120 140" fill="none" stroke="#ea80fc" stroke-width="0.8" opacity="0.25"/>
  <path d="M70 160 L100 210 L130 160" fill="none" stroke="#b39ddb" stroke-width="0.5" opacity="0.15"/>

  <!-- Head -->
  <circle cx="100" cy="65" r="32" fill="#1a0a2e" stroke="#b39ddb" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Horns -->
  <path d="M72 50 C65 30 58 15 52 8" fill="none" stroke="#ea80fc" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M128 50 C135 30 142 15 148 8" fill="none" stroke="#ea80fc" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Horn glow tips -->
  <circle cx="52" cy="8" r="3" fill="#ff2d78" opacity="0.7" filter="url(#softGlow)"/>
  <circle cx="148" cy="8" r="3" fill="#ff2d78" opacity="0.7" filter="url(#softGlow)"/>

  <!-- Eyes -->
  <ellipse cx="86" cy="62" rx="6" ry="7" fill="#0d0520"/>
  <ellipse cx="114" cy="62" rx="6" ry="7" fill="#0d0520"/>
  <!-- Eye glow -->
  <ellipse cx="86" cy="62" rx="4" ry="5" fill="#ff2d78" opacity="0.9"/>
  <ellipse cx="114" cy="62" rx="4" ry="5" fill="#ff2d78" opacity="0.9"/>
  <!-- Pupils -->
  <ellipse cx="87" cy="61" rx="2" ry="3" fill="#fff" opacity="0.9"/>
  <ellipse cx="115" cy="61" rx="2" ry="3" fill="#fff" opacity="0.9"/>
  <!-- Eye glow halos -->
  <circle cx="86" cy="62" r="10" fill="url(#eyeGlow)" opacity="0.3"/>
  <circle cx="114" cy="62" r="10" fill="url(#eyeGlow)" opacity="0.3"/>

  <!-- Mouth - mischievous smile -->
  <path d="M88 78 Q100 88 112 78" fill="none" stroke="#ff2d78" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Fang -->
  <path d="M94 78 L96 84 L98 78" fill="#fff" opacity="0.8"/>

  <!-- Floating rune particles -->
  <text x="45" y="110" font-size="10" fill="#b39ddb" opacity="0.4">✦</text>
  <text x="150" y="100" font-size="8" fill="#ea80fc" opacity="0.3">✦</text>
  <text x="55" y="200" font-size="7" fill="#ff2d78" opacity="0.25">♡</text>
  <text x="140" y="190" font-size="9" fill="#b39ddb" opacity="0.2">✦</text>

  <!-- Tiny wings hint -->
  <path d="M45 110 C25 95 20 115 40 120" fill="#2a1a3e" stroke="#b39ddb" stroke-width="0.5" opacity="0.5"/>
  <path d="M155 110 C175 95 180 115 160 120" fill="#2a1a3e" stroke="#b39ddb" stroke-width="0.5" opacity="0.5"/>
</svg>