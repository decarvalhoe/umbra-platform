<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b39ddb"/>
      <stop offset="40%" stop-color="#ff2d78"/>
      <stop offset="70%" stop-color="#ea80fc"/>
      <stop offset="100%" stop-color="#b39ddb"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d78" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff2d78" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff2d78" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#9b59b6" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Subtle line accents -->
  <line x1="40" y1="95" x2="320" y2="95" stroke="url(#accentGrad)" stroke-width="1"/>
  <line x1="60" y1="100" x2="300" y2="100" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.5"/>
  <!-- Main title -->
  <text x="180" y="78" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="900" fill="url(#textGrad)" filter="url(#outerGlow)" letter-spacing="12">UMBRA</text>
  <!-- Decorative glyphs -->
  <text x="28" y="68" text-anchor="middle" font-size="18" fill="#b39ddb" opacity="0.6" filter="url(#glow)">✦</text>
  <text x="332" y="68" text-anchor="middle" font-size="18" fill="#b39ddb" opacity="0.6" filter="url(#glow)">✦</text>
  <!-- Subtitle -->
  <text x="180" y="115" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#b39ddb" opacity="0.7" letter-spacing="6" text-transform="uppercase">HACK'N'SLASH · ROGUELITE · AI</text>
</svg>