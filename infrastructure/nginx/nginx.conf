worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream nakama {
        server nakama:7350;
    }

    upstream ai_director {
        server ai-director:8001;
    }

    upstream game_logic {
        server game-logic:8002;
    }

    upstream payment {
        server payment:8003;
    }

    upstream client {
        server client:3000;
    }

    server {
        listen 8080;
        server_name _;

        # Nakama — HTTP + WebSocket
        location /nakama/ {
            proxy_pass http://nakama/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # AI Director service
        location /api/ai-director/ {
            proxy_pass http://ai_director/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Game Logic service
        location /api/game-logic/ {
            proxy_pass http://game_logic/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Payment service
        location /api/payment/ {
            proxy_pass http://payment/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Client (default)
        location / {
            proxy_pass http://client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
