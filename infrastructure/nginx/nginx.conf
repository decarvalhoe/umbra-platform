events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:5000;
    }
    
    upstream player_service {
        server player-service:5001;
    }
    
    upstream game_state_service {
        server game-state-service:5002;
    }
    
    upstream payment_service {
        server payment-service:5003;
    }
    
    upstream cloud_profile_service {
        server cloud-profile-service:5004;
    }
    
    upstream security_service {
        server security-service:5006;
    }
    
    upstream localization_service {
        server localization-service:5007;
    }

    server {
        listen 80;
        
        # API Gateway
        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/player/ {
            proxy_pass http://player_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/game/ {
            proxy_pass http://game_state_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/payment/ {
            proxy_pass http://payment_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/cloud/ {
            proxy_pass http://cloud_profile_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/security/ {
            proxy_pass http://security_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        location /api/i18n/ {
            proxy_pass http://localization_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # Health checks
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
