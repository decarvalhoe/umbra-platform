version: '3.8'

services:
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://umbra_auth:dev_password@postgres:5432/umbra_auth
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=dev-secret-key
      - FLASK_ENV=development
    volumes:
      - ./services/auth:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  player-service:
    build:
      context: ./services/player
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=postgresql://umbra_player:dev_password@postgres:5432/umbra_player
      - REDIS_URL=redis://redis:6379/1
      - FLASK_ENV=development
    volumes:
      - ./services/player:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  game-state-service:
    build:
      context: ./services/game-state
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      - DATABASE_URL=postgresql://umbra_game:dev_password@postgres:5432/umbra_game
      - REDIS_URL=redis://redis:6379/2
      - FLASK_ENV=development
    volumes:
      - ./services/game-state:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: ./services/payment
      dockerfile: Dockerfile
    ports:
      - "5003:5003"
    environment:
      - DATABASE_URL=postgresql://umbra_payment:dev_password@postgres:5432/umbra_payment
      - REDIS_URL=redis://redis:6379/3
      - FLASK_ENV=development
    volumes:
      - ./services/payment:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cloud-profile-service:
    build:
      context: ./services/cloud-profile
      dockerfile: Dockerfile
    ports:
      - "5004:5004"
    environment:
      - DATABASE_URL=postgresql://umbra_cloud:dev_password@postgres:5432/umbra_cloud
      - REDIS_URL=redis://redis:6379/4
      - FLASK_ENV=development
    volumes:
      - ./services/cloud-profile:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  security-service:
    build:
      context: ./services/security
      dockerfile: Dockerfile
    ports:
      - "5006:5006"
    environment:
      - DATABASE_URL=postgresql://umbra_security:dev_password@postgres:5432/umbra_security
      - REDIS_URL=redis://redis:6379/5
      - FLASK_ENV=development
    volumes:
      - ./services/security:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  localization-service:
    build:
      context: ./services/localization
      dockerfile: Dockerfile
    ports:
      - "5007:5007"
    environment:
      - DATABASE_URL=postgresql://umbra_i18n:dev_password@postgres:5432/umbra_i18n
      - REDIS_URL=redis://redis:6379/6
      - FLASK_ENV=development
    volumes:
      - ./services/localization:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  game-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api
    volumes:
      - ./client:/app
      - /app/node_modules

  # Infrastructure
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - player-service
      - game-state-service
      - payment-service
      - cloud-profile-service
      - security-service
      - localization-service

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  grafana_data:
