name: Build & Push Images

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth: 'services/auth/**'
            player: 'services/player/**'
            game-state: 'services/game-state/**'
            payment: 'services/payment/**'
            cloud-profile: 'services/cloud-profile/**'
            security: 'services/security/**'
            localization: 'services/localization/**'
            client: 'client/**'

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set context path
        id: ctx
        run: |
          if [ "${{ matrix.service }}" = "client" ]; then
            echo "path=client" >> $GITHUB_OUTPUT
            echo "image=umbra-game-client" >> $GITHUB_OUTPUT
          else
            echo "path=services/${{ matrix.service }}" >> $GITHUB_OUTPUT
            echo "image=umbra-${{ matrix.service }}-service" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ steps.ctx.outputs.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ steps.ctx.outputs.image }}:${{ github.sha }}
